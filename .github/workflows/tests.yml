name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - main
      - master

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    # The suite runs on Postgres, not SQLite — pg_trgm is the matcher. Mirrors
    # docker-compose.yml: postgres 16, trust auth so a blank DB_PASSWORD works.
    # Tests\TestCase creates givebutter_detect_testing on first run.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: givebutter_detect
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_pgsql, pgsql
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      # Must precede ci:check — Wayfinder generates @/actions and @/routes
      # during the Vite build, and types:check won't resolve them otherwise.
      - name: Build Assets
        run: npm run build

      # One definition of "the build passes", shared with local development:
      # JS lint/format/types, then Pint, PHPStan, and Pest. Spelling the steps
      # out here instead is how CI silently drifted from `composer test` before.
      - name: CI Gate
        run: composer ci:check
